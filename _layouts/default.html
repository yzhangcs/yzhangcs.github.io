<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  {% include head.html %}
  <body>
    {% include back-to-top.html %}

    <!-- Site Header -->
    <header class="site-header">
      <div class="header-grid">
        <h1 class="header-name">{{ site.title }}</h1>
        
        {% if site.avatar %}
        <a href="./" class="header-avatar image avatar"><img src="{{ site.avatar }}" alt="avatar" /></a>
        {% endif %}
        
        <div class="header-icons">
          <a href="{{ site.semantic_scholar }}" aria-label="Semantic Scholar"><i class="ai ai-semantic-scholar"></i></a>
          <a href="{{ site.google_scholar }}" aria-label="Google Scholar"><i class="ai ai-google-scholar"></i></a>
          <a href="{{ site.cv_link }}" aria-label="CV"><i class="ai ai-cv"></i></a>
          <a href="{{ site.github_link }}" aria-label="GitHub"><i class="fab fa-github"></i></a>
          <a href="{{ site.arxiv_link }}" aria-label="arXiv"><i class="ai ai-arxiv"></i></a>
        </div>

        <div class="header-info">
          <div class="header-top">
            <div class="header-meta">{% if site.position %}<span class="position">{{ site.position }}</span><span class="sep">·</span>{% endif %}<a href="{{ site.affiliation_link }}" rel="noopener" class="affiliation">{{ site.affiliation }}</a></div>
            <div class="header-contact"><email>{{ site.email }}</email></div>
          </div>
          <div class="header-bio-wrapper">
            <hr class="header-divider">
            <div class="header-bio">{{ site.bio | markdownify }}</div>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="content">
      {{ content }}

      <br>
      <div class="last-updated">Last updated: <span id="last-modified"></span></div>
      <script>
        document.getElementById('last-modified').textContent = new Date(document.lastModified).toISOString().split('T')[0];
      </script>

      <br>
      <p hidden><script type="text/javascript" id="clstr_globe" src="//clustrmaps.com/globe.js?&w=50&d=HV0rAUdAxpfEQLOsVs0FcJTR2rKVI5sEQUZIDM-N_HY"></script></p>
    </main>

    <!-- Footer -->
    <footer class="site-footer"></footer>
  </body>
</html>
